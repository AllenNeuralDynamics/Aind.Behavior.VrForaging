[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
testpaths = [
    "tests",
    "src/packages/aind_behavior_vr_foraging_curricula/tests",
]

[tool.uv]
required-version = '>=0.8.4'

[tool.uv.workspace]
members = [
    "src/packages/aind_behavior_vr_foraging",
    "src/packages/aind_behavior_vr_foraging_curricula",
]

[tool.uv.sources]
aind-behavior-vr-foraging = { workspace = true }
aind-behavior-vr-foraging-curricula = { workspace = true }
