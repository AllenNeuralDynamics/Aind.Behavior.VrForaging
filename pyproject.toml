[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
testpaths = [
    "src/packages/aind_behavior_vr_foraging/tests",
    "src/packages/aind_behavior_vr_foraging_curricula/tests",
]

[tool.uv.workspace]
members = [
    "src/packages/aind_behavior_vr_foraging",
    "src/packages/aind_behavior_vr_foraging_curricula",
]

[tool.uv.sources]
aind-behavior-vr-foraging = { workspace = true }
aind-behavior-vr-foraging-curricula = { workspace = true }

[dependency-groups]
docs = [
    'mkdocs',
    'mkdocs-material',
    'mkdocstrings[python]',
    'griffe-pydantic',
    'mkdocs-autorefs>=1.4.4',
    'griffe-typingdoc>=0.3.1',
    'pymdown-extensions',
    'aind-behavior-vr-foraging[data]',
]

dev = [
    "ruff",
    "codespell",
    "pytest",
    "pytest-cov",
    'aind-behavior-vr-foraging[data]',
    'aind-behavior-vr-foraging[mappers]',
    "aind-clabe >= 0.10.5",
]

[tool.codespell]
skip = '.git,*.pdf,*.svg,./bonsai,*.bonsai,./docs/_build,uv.lock,*Generated.cs'
ignore-words-list = 'nd'

[tool.uv]
required-version = '>=0.8.4'
default-groups = ["dev"]
